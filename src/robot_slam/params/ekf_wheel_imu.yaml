# EKF 融合：轮速里程计（固定协方差膨胀）+ IMU（高精度陀螺仪）
# 轮速计权重降低为固定值，打滑时 IMU 兜底
frequency: 30
sensor_timeout: 0.1
two_d_mode: true
print_diagnostics: false
debug: false

publish_tf: true
publish_acceleration: false

map_frame: map
odom_frame: odom
base_link_frame: base_footprint
world_frame: odom

# ---- 输入1: 轮速里程计（协方差已膨胀） ----
odom0: /wheel_odom_inflated
odom0_config: [true,  true,   false,    # x, y, z
               false, false,  false,    # roll, pitch, yaw
               true,  true,   false,    # vx, vy, vz
               false, false,  false,    # vroll, vpitch, vyaw
               false, false,  false]    # ax, ay, az
odom0_differential: false
odom0_relative: false
odom0_queue_size: 5

# ---- 输入2: IMU 角速度 + 加速度 ----
imu0: /imu/data
imu0_config: [false, false, false,     # x, y, z 不用
              false, false, false,     # roll, pitch, yaw 不用
              false, false, false,     # vx, vy, vz 不用
              true,  true,  true,      # vroll, vpitch, vyaw 角速度（关键，打滑不受影响）
              true,  true,  true]      # ax, ay, az 加速度
imu0_differential: false
imu0_relative: false
imu0_remove_gravitational_acceleration: true
imu0_queue_size: 5
