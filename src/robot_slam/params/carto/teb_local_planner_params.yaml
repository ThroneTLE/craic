TebLocalPlannerROS:

  ############################################################
  # 坐标和里程计
  ############################################################

  odom_topic: /wheel_odom
  map_frame: map


  ############################################################
  # 轨迹参数
  ############################################################

  teb_autosize: true
  dt_ref: 0.25
  dt_hysteresis: 0.1

  # 全向底盘不要强行用全局路径切线覆盖 yaw，否则容易倒着跟路径走，到点后再转身
  global_plan_overwrite_orientation: false

  allow_init_with_backwards_motion: true
  max_global_plan_lookahead_dist: 0.55
  global_plan_viapoint_sep: 0.4
  global_plan_prune_distance: 0.15
  exact_arc_length: false
  feasibility_check_no_poses: 5
  publish_feedback: false


  ############################################################
  # 速度限制
  # TEB 接管后的巡航速度；起步 start24() 的比赛冲出动作不走这里
  ############################################################

  max_vel_x: 0.35
  max_vel_x_backwards: 0.16
  max_vel_y: 0.20
  max_vel_theta: 3.0

  acc_lim_x: 0.9
  acc_lim_y: 0.9
  acc_lim_theta: 2.8


  ############################################################
  # 目标容差
  # move_base 只负责到目标框外，不负责最终塞进框
  ############################################################

  xy_goal_tolerance: 0.16
  yaw_goal_tolerance: 0.28
  free_goal_vel: false
  complete_global_plan: true


  ############################################################
  # 全向底盘
  ############################################################

  min_turning_radius: 0.0
  wheelbase: 0.0
  cmd_angle_instead_rotvel: false

  weight_kinematics_nh: 0.0
  weight_kinematics_forward_drive: 0.0
  weight_kinematics_turning_radius: 0.0


  ############################################################
  # 机器人 footprint
  # 与 costmap_common_params.yaml 保持一致
  ############################################################

  footprint_model:
    type: "polygon"
    vertices: [[0.205, 0.18], [0.205, -0.18], [-0.19, -0.18], [-0.19, 0.18]]


  ############################################################
  # 障碍物约束
  # footprint 已经包含车体安全余量；格子间距约 0.39m，额外安全距离不能太大
  ############################################################

  min_obstacle_dist: 0.015
  inflation_dist: 0.11

  include_costmap_obstacles: true
  costmap_obstacles_behind_robot_dist: 0.20
  obstacle_poses_affected: 15


  ############################################################
  # 优化器
  ############################################################

  no_inner_iterations: 5
  no_outer_iterations: 4
  optimization_activate: true
  optimization_verbose: false

  penalty_epsilon: 0.02

  weight_max_vel_x: 2
  weight_max_vel_y: 2
  weight_max_vel_theta: 5

  weight_acc_lim_x: 1
  weight_acc_lim_y: 1
  weight_acc_lim_theta: 3

  weight_optimaltime: 0.3
  weight_shortest_path: 0

  # 适度贴合全局路径，避免局部优化直接拉成穿障碍的短直线
  weight_obstacle: 60
  weight_inflation: 0.45
  weight_viapoint: 1.0


  ############################################################
  # Homotopy
  # 小场地先关闭多路径，避免反复换路径
  ############################################################

  enable_homotopy_class_planning: false
  enable_multithreading: true
  max_number_classes: 2


  ############################################################
  # 恢复行为
  ############################################################

  shrink_horizon_backup: true
  shrink_horizon_min_duration: 5

  oscillation_recovery: true
  oscillation_v_eps: 0.03
  oscillation_omega_eps: 0.08
  oscillation_recovery_min_duration: 5
  oscillation_filter_duration: 5
