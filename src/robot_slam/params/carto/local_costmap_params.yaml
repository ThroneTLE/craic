local_costmap:
  global_frame: odom
  robot_base_frame: base_footprint

  update_frequency: 10.0
  publish_frequency: 5.0
  transform_tolerance: 0.5

  static_map: false
  rolling_window: true

  width: 2.0
  height: 2.0
  resolution: 0.02

  # 局部规划/TEB 使用局部膨胀，避免被全局大膨胀影响。
  inflation_radius: 0.05
  cost_scaling_factor: 10.0
