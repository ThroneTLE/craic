GlobalPlanner:
  old_navfn_behavior: false

  use_quadratic: true
  use_dijkstra: true
  use_grid_path: false

  # 封闭场地，不建议穿未知区域
  allow_unknown: false

  planner_window_x: 0.0
  planner_window_y: 0.0

  # 放宽，最终精度由精密泊车保证
  default_tolerance: 0.2

  publish_scale: 100
  planner_costmap_publish_frequency: 0.0

  lethal_cost: 253
  neutral_cost: 50
  cost_factor: 1.5
  publish_potential: false
