obstacle_range: 3.0
raytrace_range: 3.5

# 加大后的安全 footprint
# 机器人实体 36cm x 31cm，但左前/右前轮、外壳、螺丝需要留余量
# x 前方 0.205m，后方 0.190m
# y 左右 0.180m
footprint: [[0.205, 0.18], [0.205, -0.18], [-0.19, -0.18], [-0.19, 0.18]]

# 局部 TEB 要在约 0.39m 格子通道内通过；footprint 已经包含车体安全余量。
# 这里保留少量软代价即可，不能再用强膨胀，否则局部轨迹会被判不可行。
inflation_radius: 0.05
cost_scaling_factor: 6.0

map_type: costmap

observation_sources: scan board_obstacles

scan:
  sensor_frame: laser_link
  data_type: LaserScan
  topic: /scan_filtered
  marking: true
  clearing: true
  expected_update_rate: 0.0
  obstacle_range: 3.0
  raytrace_range: 3.5
  observation_persistence: 0.3

board_obstacles:
  sensor_frame: map
  data_type: PointCloud2
  topic: /board_localizer/obstacles
  marking: true
  clearing: false
  expected_update_rate: 0.0
  observation_persistence: 0.4
  obstacle_range: 4.0
  min_obstacle_height: -0.05
  max_obstacle_height: 0.40
